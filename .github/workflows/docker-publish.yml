name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        re2c_version: [3.1, 4.0.1, 4.0.2, 4.1, 4.2, 4.3, 4.4]

    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx
      # https://github.com/docker/build-push-action
      - name: Build Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          build-args:
            - VERSION=${{ matrix.re2c_version }}
          push: false # ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Release artifact
      - name: Take out artifact
        if: ${{ github.event_name != 'pull_request' }}
        run: docker run -v .:/mnt --rm ${{ steps.meta.outputs.tags }} sh -c 'cp -p *.tar.gz /mnt'

      - name: Create a release
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/create-release@v1
        id: create_release
        with:
          draft: false
          prelease: false
          release_name: ${{ github.ref }}
          tag_name: ${{ github.ref }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: re2c-${{ matrix.re2c_version }}-rhel8.tar.gz
          asset_name: re2c-${{ matrix.re2c_version }}-rhel8.tar.gz
          asset_content_type: application/gzip

      - name: Upload debug info artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: re2c-${{ matrix.re2c_version }}-rhel8-debug.tar.gz
          asset_name: re2c-${{ matrix.re2c_version }}-rhel8-debug.tar.gz
          asset_content_type: application/gzip

      - name: Upload debug info artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: re2c-${{ matrix.re2c_version }}-rhel8-debugsource.tar.gz
          asset_name: re2c-${{ matrix.re2c_version }}-rhel8-debugsource.tar.gz
          asset_content_type: application/gzip
